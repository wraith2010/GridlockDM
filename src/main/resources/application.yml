spring:
  application:
    name: GridlockDM

  datasource:
    url: jdbc:postgresql://localhost:5432/gridlockdm
    username: ${DB_USERNAME:gridlock}
    password: ${DB_PASSWORD:gridlock}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate validates only
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 20MB         # PDF + map image uploads
      max-request-size: 25MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
  error:
    include-message: always       # useful for dev; restrict in prod

gridlock:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-a-long-random-string-at-least-256-bits}
    expiry-ms: 86400000           # 24 hours for regular users
    observer-expiry-ms: 43200000  # 12 hours for observer tokens

  ddb:
    character-api-base: https://www.dndbeyond.com/character
    character-service-base: https://character-service.dndbeyond.com/character/v5/character
    request-timeout-ms: 15000

  session:
    invite-code-length: 8        # e.g. WOLF-4271
    max-players-per-session: 10

  uploads:
    map-dir: ${MAP_UPLOAD_DIR:./uploads/maps}
    map-url-prefix: /uploads/maps

  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}

logging:
  level:
    com.gridlockdm: DEBUG
    org.springframework.websocket: INFO
    org.springframework.security: INFO

---
# Test profile — overrides for unit/integration tests
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
