services:

  postgres:
    image: postgres:16-alpine
    container_name: gridlockdm-postgres
    environment:
      POSTGRES_USER:     ${DB_USERNAME:-gridlock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gridlock}
      POSTGRES_DB:       gridlockdm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-gridlock} -d gridlockdm"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gridlockdm-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USERNAME: ${DB_USERNAME:-gridlock}
      DB_PASSWORD: ${DB_PASSWORD:-gridlock}
      JWT_SECRET:       ${JWT_SECRET:-change-me-in-production-use-256-bit-random}
      PORT:             ${PORT:-8080}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gridlockdm
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - map_uploads:/app/uploads
    restart: unless-stopped

volumes:
  postgres_data:
  map_uploads:
